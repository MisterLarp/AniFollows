  scriptLabel.innerText = instagramScript;

  if (bookmarkletLink) {
    const bookmarkletHref = 'javascript:' + encodeURIComponent(`(function(){${instagramScript}})()`);
    bookmarkletLink.href = bookmarkletHref;
  }

  async function copyToClipboard() {
    try {
      const distRes = await fetch("dist/dist.js");
      if (distRes.ok) {
        const distScript = await distRes.text();
        await navigator.clipboard.writeText(distScript);
        overlayControl("show");
        return;
      }
    } catch (error) {
      console.warn("Could not fetch dist/dist.js, using embedded script:", error);
    }

    if (typeof instagramScript !== "undefined") {
      try {
        await navigator.clipboard.writeText(instagramScript);
        overlayControl("show");
      } catch (error) {
        console.error("Failed to copy text: ", error);
      }
    }
  }

  function overlayControl(state) {
    const overlay = document.getElementById("overlay");

    if (state === "show") {
      overlay.classList.add("show");
    } else if (state === "hide") {
      overlay.classList.remove("show");
    }
  }
